server:
  port: 9001
  servlet:
    context-path: /api
spring:
  datasource:
    # URL: jdbc:h2:file:./data/usersdb when logging in to h2 console
    url: jdbc:h2:file:./data/usersdb;DB_CLOSE_ON_EXIT=FALSE
    username: admin
    password: admin
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  #change the secret key to a random string
  secret: this-need-a-very-long-random-string-for-jwt-token
  expiration-ms: 3600000
