<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Access Logging System</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #15803d;
      --error: #b91c1c;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .hidden {
      display: none !important;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
    }

    #loginPage {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 48px);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
    }

    h1, h2 {
      margin-bottom: 12px;
    }

    p.subtitle {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .danger {
      background: var(--danger);
    }

    .danger:hover {
      background: var(--danger-hover);
    }

    .message {
      min-height: 20px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .message.success {
      color: var(--success);
    }

    .message.error {
      color: var(--error);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .profile-panel {
      margin-bottom: 14px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #fff;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f3f4f6;
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- Login page -->
    <section id="loginPage">
      <div class="card login-card">
        <h1>A login system</h1>
        <p class="subtitle">Sign in to continue</p>

        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter username" autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
        </div>

        <button id="loginBtn" type="button">Login</button>
        <div id="loginMessage" class="message"></div>
      </div>
    </section>

    <!-- Dashboard page -->
    <section id="dashboardPage" class="hidden">
      <div class="card">
        <div class="top-bar">
          <div>
            <h2>Dashboard</h2>
            <p class="small-note">Auto refresh every 30 seconds</p>
          </div>
          <div class="button-row">
            <button id="viewProfileBtn" type="button">View Profile</button>
            <button id="refreshBtn" type="button">Refresh Logs</button>
            <button id="logoutBtn" type="button" class="danger">Logout</button>
          </div>
        </div>

        <div id="dashboardMessage" class="message"></div>
        <div id="profilePanel" class="profile-panel hidden">
          <h3>My Profile</h3>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody id="profileTableBody">
              <tr>
                <td colspan="3">No profile loaded.</td>
              </tr>
            </tbody>
          </table>

          <h3 style="margin-top: 12px;">My Login Records</h3>
          <table>
            <thead>
              <tr>
                <th>Success</th>
                <th>Message</th>
                <th>Login Time</th>
              </tr>
            </thead>
            <tbody id="profileLogsTableBody">
              <tr>
                <td colspan="3">No login records loaded.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div id="accessLogsSection">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Success</th>
              <th>Message</th>
              <th>Login Time</th>
            </tr>
          </thead>
          <tbody id="logsTableBody">
            <tr>
              <td colspan="5">No data loaded.</td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = `${window.location.origin || "http://localhost:9001"}/api`;
    const TOKEN_KEY = "jwtToken";
    let autoRefreshId = null;

    const loginPage = document.getElementById("loginPage");
    const dashboardPage = document.getElementById("dashboardPage");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const loginMessage = document.getElementById("loginMessage");

    const dashboardMessage = document.getElementById("dashboardMessage");
    const profilePanel = document.getElementById("profilePanel");
    const profileTableBody = document.getElementById("profileTableBody");
    const profileLogsTableBody = document.getElementById("profileLogsTableBody");
    const logsTableBody = document.getElementById("logsTableBody");
    const accessLogsSection = document.getElementById("accessLogsSection");
    const viewProfileBtn = document.getElementById("viewProfileBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    // Set message text with type-based color.
    function showMessage(element, text, type) {
      element.textContent = text;
      element.classList.remove("success", "error");
      if (type) element.classList.add(type);
    }

    // Read JWT token from localStorage.
    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    // Save JWT token to localStorage.
    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
    }

    // Remove JWT token and stop background refresh.
    function clearToken() {
      localStorage.removeItem(TOKEN_KEY);
      stopAutoRefresh();
    }

    // Centralized request method that injects Authorization header.
    async function apiRequest(path, options = {}) {
      const token = getToken();
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }

      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers
      });

      if (response.status === 401) {
        redirectToLogin("Token missing or invalid. Please login again.");
        throw new Error("Unauthorized");
      }

      if (response.status === 403) {
        throw new Error("Forbidden");
      }

      return response;
    }

    function getRoleFromToken() {
      const token = getToken();
      if (!token) return null;
      const parts = token.split(".");
      if (parts.length < 2) return null;

      try {
        const base64Url = parts[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split("")
            .map((c) => `%${("00" + c.charCodeAt(0).toString(16)).slice(-2)}`)
            .join("")
        );
        const payload = JSON.parse(jsonPayload);
        return payload.role || null;
      } catch (e) {
        return null;
      }
    }

    // Switch to login page and reset dashboard-only state.
    function showLoginPage() {
      loginPage.classList.remove("hidden");
      dashboardPage.classList.add("hidden");
      profilePanel.classList.add("hidden");
      profileTableBody.innerHTML = "<tr><td colspan='3'>No profile loaded.</td></tr>";
      profileLogsTableBody.innerHTML = "<tr><td colspan='3'>No login records loaded.</td></tr>";
      accessLogsSection.classList.add("hidden");
      refreshBtn.classList.add("hidden");
      showMessage(dashboardMessage, "", null);
    }

    // Switch to dashboard page.
    function showDashboardPage() {
      loginPage.classList.add("hidden");
      dashboardPage.classList.remove("hidden");
    }

    function updateAccessLogsUIByRole(role) {
      const isAdmin = role === "ADMIN";
      accessLogsSection.classList.toggle("hidden", !isAdmin);
      refreshBtn.classList.toggle("hidden", !isAdmin);
      if (!isAdmin) {
        renderLogs([]);
      }
    }

    // Redirect user to login screen after clearing session.
    function redirectToLogin(reason = "") {
      clearToken();
      showLoginPage();
      if (reason) {
        showMessage(loginMessage, reason, "error");
      }
    }

    // Handle login action and persist token on success.
    async function handleLogin() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showMessage(loginMessage, "Please enter both username and password.", "error");
        return;
      }

      showMessage(loginMessage, "Logging in...", null);

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        let payload = {};
        try {
          payload = await response.json();
        } catch (e) {
          payload = {};
        }

        if (!response.ok) {
          const message = payload.message || "Login failed. Check your credentials.";
          showMessage(loginMessage, message, "error");
          return;
        }

        const token = payload.token || payload.jwt || payload.accessToken;
        if (!token) {
          showMessage(loginMessage, "Login succeeded but token is missing.", "error");
          return;
        }

        setToken(token);
        showMessage(loginMessage, "Login successful.", "success");
        showDashboardPage();
        const role = getRoleFromToken();
        updateAccessLogsUIByRole(role);
        if (role === "ADMIN") {
          await loadAccessLogs();
          startAutoRefresh();
        } else {
          stopAutoRefresh();
          renderLogs([]);
          showMessage(dashboardMessage, "Logged in (no admin access logs permission).", "success");
        }
      } catch (error) {
        showMessage(loginMessage, "Unable to connect to server.", "error");
      }
    }

    function renderProfile(data) {
      const id = data?.id ?? "-";
      const name = data?.name ?? data?.username ?? "-";
      const role = data?.role ?? "-";
      const records = Array.isArray(data?.loginRecords) ? data.loginRecords : [];

      profileTableBody.innerHTML = `
        <tr>
          <td>${String(id)}</td>
          <td>${String(name)}</td>
          <td>${String(role)}</td>
        </tr>
      `;

      if (records.length === 0) {
        profileLogsTableBody.innerHTML = "<tr><td colspan='3'>No login records found.</td></tr>";
        return;
      }

      profileLogsTableBody.innerHTML = records
        .map((record) => {
          const success = record.success ?? "-";
          const message = record.message ?? "-";
          const loginTime = record.loginTime ?? record.logintime ?? "-";
          return `
            <tr>
              <td>${String(success)}</td>
              <td>${String(message)}</td>
              <td>${String(loginTime)}</td>
            </tr>
          `;
        })
        .join("");
    }

    // Load profile information from backend and display it.
    async function loadProfile() {
      showMessage(dashboardMessage, "Loading profile...", null);
      try {
        const response = await apiRequest("/profile", { method: "GET" });
        const data = await response.json();
        profilePanel.classList.remove("hidden");
        renderProfile(data);
        showMessage(dashboardMessage, "Profile loaded successfully.", "success");
      } catch (error) {
        if (error.message === "Forbidden") {
          showMessage(dashboardMessage, "You don't have permission to view profile.", "error");
          return;
        }
        if (error.message !== "Unauthorized") showMessage(dashboardMessage, "Failed to load profile.", "error");
      }
    }

    // Render access log records into table body.
    function renderLogs(logs) {
      if (!Array.isArray(logs) || logs.length === 0) {
        logsTableBody.innerHTML = "<tr><td colspan='5'>No access logs found.</td></tr>";
        return;
      }

      logsTableBody.innerHTML = logs
        .map((log) => {
          const user = log.user ?? log.username ?? "-";
          const role = log.role ?? "-";
          const success = log.success ?? "-";
          const message = log.message ?? "-";
          const loginTime = log.logintime ?? log.loginTime ?? "-";

          return `
            <tr>
              <td>${String(user)}</td>
              <td>${String(role)}</td>
              <td>${String(success)}</td>
              <td>${String(message)}</td>
              <td>${String(loginTime)}</td>
            </tr>
          `;
        })
        .join("");
    }

    // Fetch latest access logs and update table without reload.
    async function loadAccessLogs() {
      showMessage(dashboardMessage, "Loading access logs...", null);
      try {
        const response = await apiRequest("/access", { method: "GET" });
        const data = await response.json();
        renderLogs(data);
        showMessage(dashboardMessage, "Access logs updated.", "success");
      } catch (error) {
        if (error.message === "Forbidden") {
          showMessage(dashboardMessage, "You don't have permission to view access logs.", "error");
          return;
        }
        if (error.message !== "Unauthorized") showMessage(dashboardMessage, "Failed to load access logs.", "error");
      }
    }

    // Start automatic table refresh every 30 seconds.
    function startAutoRefresh() {
      stopAutoRefresh();
      autoRefreshId = setInterval(loadAccessLogs, 30000);
    }

    // Stop automatic table refresh if currently active.
    function stopAutoRefresh() {
      if (autoRefreshId) {
        clearInterval(autoRefreshId);
        autoRefreshId = null;
      }
    }

    // Logout user by clearing token and returning to login page.
    function handleLogout() {
      redirectToLogin("You have been logged out.");
      showMessage(loginMessage, "You have been logged out.", "success");
    }

    // Attach UI event handlers.
    loginBtn.addEventListener("click", handleLogin);
    viewProfileBtn.addEventListener("click", loadProfile);
    refreshBtn.addEventListener("click", loadAccessLogs);
    logoutBtn.addEventListener("click", handleLogout);

    // Allow Enter key login from password field.
    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleLogin();
      }
    });

    // Initialize app based on token existence.
    async function initializeApp() {
      const token = getToken();
      if (!token) {
        showLoginPage();
        return;
      }

      showDashboardPage();
      try {
        const role = getRoleFromToken();
        updateAccessLogsUIByRole(role);
        if (role === "ADMIN") {
          await loadAccessLogs();
          startAutoRefresh();
        }
      } catch (error) {
        redirectToLogin("Session expired. Please login again.");
      }
    }

    initializeApp();
  </script>
</body>
</html>
